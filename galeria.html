<!DOCTYPE html>
<html lang="es">

<head>

<body>

    
<header class="hero">

    <video class="hero-video" autoplay muted loop playsinline>
        <source src="FOTOSVIDEOS/videos/video_web1.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay">
<img src="FOTOSVIDEOS/logos/blancofirmaignacio.PNG" class="hero-logo">
        <h1>Mi Galería</h1>
        <p>Descubre algunos de mis mejores trabajos de fotografía y vídeo.</p>
        <a href="index.html" class="volver">
            ← Volver al inicio
        </a>

    </div>
</header>


    
<section class="albums">  
    <!-- Deportes -->
    <a class="album-card"
       href="https://galeria.ignaciocarrillo.es/sharing/rgR99LoRc"
       target="_blank"
       rel="noopener noreferrer">

        <img src="FOTOSVIDEOS/abrazo.JPG" alt="Deportes">

        <div class="overlay">

            <h2>Deportes</h2>

            <p>Fotografía deportiva</p>

            <span>Ver álbum →</span>

    <!-- Fiestas -->

       href="https://galeria.ignaciocarrillo.es/sharing/TUENLACE"

        <div class="overlay">

            <h2>Fiestas</h2>

            <p>Eventos y celebraciones</p>

            <span>Ver álbum →</span>

        </div>

    </a>


    
    <!-- Bodas -->

    <a class="album-card"
       href="https://galeria.ignaciocarrillo.es/sharing/TUENLACE"
       target="_blank"
       rel="noopener noreferrer">

        <img src="FOTOSVIDEOS/PORTADAS/bodas.jpg" alt="Bodas">

        <div class="overlay">

            <h2>Bodas</h2>

            <p>Reportajes inolvidables</p>

            <span>Ver álbum →</span>
        </div>
    </a>
